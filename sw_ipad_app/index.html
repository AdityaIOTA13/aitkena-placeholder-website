<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aitkena — iPad Sales App</title>
  <meta name="description" content="aitkena iPad sales app prototype — immersive AR/VR experience for construction project presentations." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%231F6FEB'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:      #1F6FEB;
      --muted:     #6B7E96;
      --border:    rgba(31,111,235,0.12);
      --white:     #FFFFFF;
    }

    html, body {
      height: 100%;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #f0f0f0;
      overflow: hidden;
    }

    /* ── Nav ─────────────────────────────────────────────── */
    .site-nav {
      height: 52px;
      display: flex;
      align-items: center;
      background: rgba(247,249,252,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      gap: 16px;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--blue);
      text-decoration: none;
      padding: 6px 14px;
      border: 1.5px solid var(--blue);
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn-back:hover { background: var(--blue); color: var(--white); }

    .nav-sep {
      width: 1px;
      height: 16px;
      background: var(--border);
      flex-shrink: 0;
    }

    .nav-crumb {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--muted);
    }

    .nav-spacer { flex: 1; }

    .nav-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .nav-logo img { height: 24px; width: auto; display: block; }
    .nav-logo-fallback {
      font-size: 17px;
      font-weight: 800;
      color: var(--blue);
      letter-spacing: -0.04em;
      display: none;
    }

    /* ── Iframe ───────────────────────────────────────────── */
    .embed-wrap {
      width: 100%;
      height: calc(100vh - 52px);
    }

    .embed-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <nav class="site-nav" role="navigation" aria-label="App navigation">
    <a href="/" class="btn-back">← Back to site</a>
    <span class="nav-sep" aria-hidden="true"></span>
    <span class="nav-crumb">iPad Sales App</span>
    <span class="nav-spacer"></span>
    <a href="/" class="nav-logo" aria-label="Back to aitkena home">
      <img
        src="../assets/aitkena_logo.svg"
        alt="aitkena"
        onerror="this.style.display='none';this.nextElementSibling.style.display='block';"
      />
      <span class="nav-logo-fallback">aitkena</span>
    </a>
  </nav>

  <div class="embed-wrap">
    <iframe
      src="https://dice-melody-41617356.figma.site/"
      title="aitkena iPad sales app prototype"
      allow="fullscreen"
      loading="lazy"
    ></iframe>
  </div>

</body>
</html>
